{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<form action="/login" method="POST">
    <label>Email</label>
    <input type="text" name="email">
    <label>Password</label>
    <input type="password" name="password">
    <input type="submit" value="Login">
</form>

{% if fail %}
<p>Failed!</p>
{% endif %}

{% endblock %}
